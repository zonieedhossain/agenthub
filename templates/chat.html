{% extends "base.html" %}
{% block title %}Chat — AgentHub{% endblock %}
{% block content %}
<div style="display:flex;justify-content:space-between;align-items:center">
    <a class="back" href="/agents/{{ slug }}">← {{ slug }}</a>
    <button class="link-btn" onclick="logout()">Log out</button>
</div>
<div class="chat-app">
    <aside class="chat-sidebar" id="subtabs"></aside>
    <div class="chat-main">
        <div class="chat-header" id="chatHeader"></div>
        <div id="msgs" class="msgs"></div>
        <div class="composer">
            <input id="chatin" placeholder="Type a message…" onkeydown="if(event.key==='Enter')send()">
            <button class="btn send-btn" id="sendBtn" onclick="send()">➤</button>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    const slug = "{{ slug }}";
    const token = localStorage.getItem(`token_${slug}`);
    if (!token) window.location.href = `/agents/${slug}/auth`;

    function logout() {
      localStorage.removeItem(`token_${slug}`);
      window.location.href = `/agents/${slug}/auth`;
    }

    let activeSub = null;
    let activeName = 'Main agent';

    let history = [];

    fetch(`/api/agents/${slug}`).then(r => r.json()).then(a => {
      window.__agentProfession = a.profession;
      const tabs = document.getElementById('subtabs');
      tabs.innerHTML =
        `<div class="sidebar-item on" data-id="" data-name="Main agent">
           <div class="app-icon sm" style="background:${colorFor(a.profession)}">${esc(initials(a.profession))}</div>
           <span>Main agent</span>
         </div>` +
        a.sub_agents.map(s => `
          <div class="sidebar-item" data-id="${s.id}" data-name="${esc(s.name)}">
            <div class="app-icon sm" style="background:${colorFor(s.name)}">${esc(initials(s.name))}</div>
            <span>${esc(s.name)}</span>
          </div>`).join('');
      drawHeader();
      loadHistory(null);
    });

    // Event delegation instead of inline onclick with interpolated names:
    // esc() HTML-escapes for attribute context, but the browser HTML-decodes
    // attribute values before an inline onclick's JS ever runs — a name with
    // an apostrophe would decode back to a raw quote and break out of the
    // handler's string literal. data-* attributes sidestep that entirely.
    document.getElementById('subtabs').addEventListener('click', (e) => {
      const item = e.target.closest('.sidebar-item');
      if (!item) return;
      pick(item.dataset.id ? Number(item.dataset.id) : null, item.dataset.name, item);
    });

    function drawHeader() {
      const seed = activeSub ? activeName : (window.__agentProfession || slug);
      document.getElementById('chatHeader').innerHTML = `
        <div class="app-icon sm" style="background:${colorFor(seed)}">${esc(initials(seed))}</div>
        <div>
          <div class="chat-header-title">${esc(activeName)}</div>
          <div class="chat-header-sub">${esc(window.__agentProfession || slug)}</div>
        </div>
      `;
    }

    // Pulls this conversation's history from the server instead of starting blank —
    // switching tabs (or reloading the page) no longer loses what was already said.
    async function loadHistory(subId) {
      const box = document.getElementById('msgs');
      box.innerHTML = '<div class="hist-loading">Loading conversation…</div>';
      const qs = subId ? `?sub_agent_id=${subId}` : '';
      const res = await fetch(`/agents/${slug}/chat/history${qs}`, {
        headers: {'Authorization': `Bearer ${token}`},
      });
      history = res.ok
        ? (await res.json()).items.map(m => ({role: m.role === 'assistant' ? 'bot' : 'user', content: m.content}))
        : [];
      draw();
    }

    function pick(id, name, el) {
      activeSub = id;
      activeName = name;
      document.querySelectorAll('.sidebar-item').forEach(t => t.classList.remove('on'));
      el.classList.add('on');
      drawHeader();
      loadHistory(id);
    }

    function draw() {
      const box = document.getElementById('msgs');
      if (!history.length) {
        box.innerHTML = `<div class="empty-chat">👋 Say hello to get started.</div>`;
        return;
      }
      box.innerHTML = history.map(m => `
        <div class="msg-row ${m.role}">
          ${m.role === 'bot' ? `<div class="app-icon xs" style="background:${colorFor(activeSub ? activeName : (window.__agentProfession || slug))}">${esc(initials(activeSub ? activeName : (window.__agentProfession || slug)))}</div>` : ''}
          <div class="msg ${m.role}">${m.role === 'bot' ? formatReply(m.content) : esc(m.content)}</div>
        </div>`).join('');
      box.scrollTop = box.scrollHeight;
    }

    // Light markdown-style rendering for bot replies: bold, inline code, bullet
    // lists, and paragraph/line breaks. Escapes first, then only ever injects
    // tags it constructs itself around already-escaped text — never re-opens
    // the innerHTML XSS hole the escaping was added to close.
    function inlineFormat(s) {
      return s
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code>$1</code>');
    }

    function formatReply(raw) {
      const blocks = esc(raw).split(/\n\s*\n/);
      return blocks.map(block => {
        const lines = block.split('\n').filter(l => l.trim() !== '');
        if (lines.length && lines.every(l => /^[-*]\s+/.test(l))) {
          return '<ul>' + lines.map(l => `<li>${inlineFormat(l.replace(/^[-*]\s+/, ''))}</li>`).join('') + '</ul>';
        }
        return `<p>${lines.map(inlineFormat).join('<br>')}</p>`;
      }).join('');
    }

    function setBusy(busy) {
      document.getElementById('chatin').disabled = busy;
      document.getElementById('sendBtn').disabled = busy;
    }

    function showThinking() {
      const box = document.getElementById('msgs');
      const el = document.createElement('div');
      el.className = 'msg-row bot';
      el.innerHTML = `<div class="app-icon xs" style="background:${colorFor(activeSub ? activeName : (window.__agentProfession || slug))}">${esc(initials(activeSub ? activeName : (window.__agentProfession || slug)))}</div>
        <div class="msg bot thinking"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
      box.appendChild(el);
      box.scrollTop = box.scrollHeight;
      return el;
    }

    async function send() {
      const input = document.getElementById('chatin');
      const message = input.value.trim();
      if (!message) return;
      input.value = '';
      history.push({role: 'user', content: message});
      draw();

      setBusy(true);
      const thinkingEl = showThinking();
      try {
        const res = await fetch(`/agents/${slug}/chat`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
          body: JSON.stringify({message, sub_agent_id: activeSub}),
        });
        const data = await res.json();
        if (res.ok) {
          history.push({role: 'bot', content: data.reply});
        } else {
          const msg = Array.isArray(data.detail) ? data.detail.map(d => d.msg).join('; ') : (data.detail || 'failed');
          history.push({role: 'bot', content: 'Error: ' + msg});
          toast(msg, 'error');
        }
      } catch (e) {
        history.push({role: 'bot', content: 'Error: could not reach the server'});
        toast('Could not reach the server', 'error');
      } finally {
        thinkingEl.remove();
        setBusy(false);
        draw();
        input.focus();
      }
    }
</script>
{% endblock %}
