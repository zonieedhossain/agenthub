{% extends "base.html" %}
{% block title %}Admin — AgentHub{% endblock %}
{% block content %}
<div id="loginGate">
    <div class="card" style="max-width:420px">
        <div class="agent-title" style="font-size:18px">Admin sign in</div>
        <label>Username</label>
        <input id="adminUser" autocomplete="username">
        <label>Password</label>
        <input id="adminPass" type="password" autocomplete="current-password"
               onkeydown="if(event.key==='Enter')adminLogin()">
        <div class="err" id="loginErr"></div>
        <button class="btn" style="width:100%" onclick="adminLogin()">Sign in</button>
    </div>
</div>

<div id="adminApp" style="display:none">
    <div class="admin-header">
        <div class="admin-title">Admin — Agents</div>
        <div class="session-badge">
            <span class="dot"></span> Signed in as admin
            <button class="link-btn" onclick="adminLogout()">Log out</button>
        </div>
    </div>

    <div class="card">
        <div class="agent-title" style="font-size:18px">Add a new agent</div>
        <label>Number</label><input id="number" type="number" min="1">
        <label>Industry</label><input id="industry">
        <label>Profession</label><input id="profession">
        <div id="subs"></div>
        <button class="btn ghost" type="button" onclick="addSubRow()">+ Add sub-agent</button>
        <div id="dupWarning"></div>
        <div class="err" id="err"></div>
        <button class="btn" id="submitBtn" style="width:100%;margin-top:14px" onclick="submitAgent()">Create agent</button>
    </div>

    <div class="section-label">Recently added / updated</div>
    <div id="recentList" class="recent-list"></div>

    <div class="section-label">Usage</div>
    <div class="card" id="statsCard"><div id="agentList"></div></div>
</div>
{% endblock %}
{% block scripts %}
<script>
    let auth = null;
    let pendingUpdateSlug = null; // set when the typed profession matches an existing agent, awaiting confirmation

    // Mirrors pipeline/ingest.py's slugify() closely enough to warn before
    // submit — doesn't need to be byte-perfect, just good enough to catch
    // "this profession already exists" before silently overwriting it.
    function jsSlugify(text) {
      return text.normalize('NFKD').replace(/[̀-ͯ]/g, '')
        .toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    }

    async function adminLogin() {
      const u = document.getElementById('adminUser').value;
      const p = document.getElementById('adminPass').value;
      const candidate = "Basic " + btoa(unescape(encodeURIComponent(`${u}:${p}`)));
      const errEl = document.getElementById('loginErr');
      errEl.textContent = '';

      let res;
      try {
        res = await fetch('/admin/stats', { headers: { Authorization: candidate } });
      } catch (e) {
        errEl.textContent = 'Could not reach the server';
        toast('Could not reach the server', 'error');
        return;
      }
      if (!res.ok) {
        const msg = res.status === 401 ? 'Invalid admin credentials' : 'Sign in failed';
        errEl.textContent = msg;
        toast(msg, 'error');
        return;
      }

      auth = candidate;
      document.getElementById('loginGate').style.display = 'none';
      document.getElementById('adminApp').style.display = 'block';
      toast('Signed in as admin');
      renderStats(await res.json());
      loadRecent();
    }

    function adminLogout() {
      auth = null;
      document.getElementById('adminApp').style.display = 'none';
      document.getElementById('loginGate').style.display = 'block';
      document.getElementById('adminUser').value = '';
      document.getElementById('adminPass').value = '';
      toast('Logged out');
    }

    function addSubRow() {
      const div = document.createElement('div');
      div.className = 'sub-row';
      div.innerHTML = `<input placeholder="Sub-agent name" class="sname"> <input placeholder="Task" class="stask">`;
      document.getElementById('subs').appendChild(div);
    }
    addSubRow(); addSubRow();

    // Warn before silently overwriting an existing agent instead of just
    // upserting blind — checks the public catalog API (no admin auth needed)
    // for a slug collision as the admin types the profession.
    document.getElementById('profession').addEventListener('blur', async (e) => {
      const dup = document.getElementById('dupWarning');
      const btn = document.getElementById('submitBtn');
      pendingUpdateSlug = null;
      dup.innerHTML = '';
      btn.textContent = 'Create agent';

      const slug = jsSlugify(e.target.value);
      if (!slug) return;
      const res = await fetch(`/api/agents/${encodeURIComponent(slug)}`);
      if (!res.ok) return;
      const existing = await res.json();
      pendingUpdateSlug = slug;
      dup.innerHTML = `<div class="warn-box">⚠️ An agent for "${esc(existing.profession)}" already exists
        (${esc(existing.industry)}, ${existing.sub_agents.length} sub-agents). Submitting will <b>update</b> it,
        not create a new one.</div>`;
      btn.textContent = 'Update existing agent';
    });

    async function submitAgent() {
      const subs = [...document.querySelectorAll('#subs .sub-row')].map(row => ({
        name: row.querySelector('.sname').value,
        task: row.querySelector('.stask').value,
      })).filter(s => s.name && s.task);

      const body = {
        number: parseInt(document.getElementById('number').value),
        industry: document.getElementById('industry').value,
        profession: document.getElementById('profession').value,
        sub_agents: subs,
      };

      const res = await fetch('/admin/agents', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'Authorization': auth},
        body: JSON.stringify(body),
      });
      const data = await res.json();

      if (!res.ok) {
        const msg = Array.isArray(data.detail)
          ? data.detail.map(d => d.msg).join('; ')
          : (data.detail || 'Failed to save agent');
        document.getElementById('err').textContent = msg;
        toast(msg, 'error');
        return;
      }

      document.getElementById('err').textContent = '';
      document.getElementById('dupWarning').innerHTML = '';
      document.getElementById('submitBtn').textContent = 'Create agent';
      pendingUpdateSlug = null;
      toast(data.message);
      loadAgents();
      loadRecent();
    }

    function renderStats(data) {
      document.getElementById('agentList').innerHTML = data.length
        ? '<table class="stats-table">' +
          data.map(r => `
            <tr>
              <td style="display:flex;align-items:center;gap:8px">
                <div class="app-icon xs" style="background:${colorFor(r.agent)}">${esc(initials(r.agent))}</div>
                ${esc(r.agent)}
              </td>
              <td class="num">${r.requests} reqs</td>
              <td class="num">${r.tokens} tokens</td>
            </tr>`).join('') +
          '</table>'
        : '<div class="empty-note">No chat activity yet.</div>';
    }

    async function loadAgents() {
      const res = await fetch('/admin/stats', { headers: {'Authorization': auth} });
      const data = await res.json();
      renderStats(data);
    }

    // Public catalog endpoint, already sorted most-recently-updated first —
    // shows every agent (not just ones with chat usage) so a freshly added
    // or edited agent is immediately visible for verification.
    async function loadRecent() {
      const res = await fetch('/agents?limit=8');
      const data = await res.json();
      document.getElementById('recentList').innerHTML = data.items.map(a => `
        <div class="recent-card">
          <div class="app-icon sm" style="background:${colorFor(a.profession)}">${esc(initials(a.profession))}</div>
          <div>
            <div class="app-name">${esc(a.profession)}</div>
            <div class="app-industry">${esc(a.industry)}</div>
          </div>
        </div>`).join('');
    }
</script>
{% endblock %}
