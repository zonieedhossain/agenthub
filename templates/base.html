<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AgentHub{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
    <div class="wrap hrow">
        <a class="logo" href="/">🤖 Agent<span>Hub</span></a>
    </div>
</header>
<main class="wrap">
    {% block content %}{% endblock %}
</main>
<div id="toastStack" class="toast-stack"></div>
<script>
    function toast(message, type = 'success') {
      const stack = document.getElementById('toastStack');
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.innerHTML = `<span class="toast-icon">${type === 'success' ? '✓' : '!'}</span><span>${esc(message)}</span>`;
      stack.appendChild(el);
      requestAnimationFrame(() => el.classList.add('in'));
      setTimeout(() => {
        el.classList.remove('in');
        setTimeout(() => el.remove(), 250);
      }, 3200);
    }

    const HTTP_STATUS_LABELS = {
      400: 'Bad Request', 401: 'Unauthorized', 403: 'Forbidden', 404: 'Not Found',
      409: 'Conflict', 422: 'Validation Error', 429: 'Too Many Requests',
      500: 'Server Error', 502: 'Bad Gateway', 503: 'Service Unavailable',
    };

    // Every backend error shape in one place: FastAPI's {detail: "..."},
    // Pydantic's {detail: [{msg: "..."}]} validation array, and slowapi's
    // rate-limit responses which use {error: "..."} instead of "detail" —
    // a mismatch that silently showed "failed" for real 429s before this.
    function apiErrorMessage(status, data) {
      const label = HTTP_STATUS_LABELS[status] || `Error ${status}`;
      let detail;
      if (Array.isArray(data?.detail)) detail = data.detail.map(d => d.msg).join('; ');
      else if (typeof data?.detail === 'string') detail = data.detail;
      else if (typeof data?.error === 'string') detail = data.error;
      else detail = 'Something went wrong';
      return `${status} ${label} — ${detail}`;
    }
</script>
<script>
    function esc(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }

    // A small, playful, fixed palette so every agent gets a consistent,
    // distinct-looking "app icon" color derived from its own name — same
    // idea as Slack/Gmail-style generated avatars, no image assets needed.
    const AVATAR_PALETTE = [
      '#FF6B6B', '#4ECDC4', '#FFB84C', '#6C5CE7', '#00B894',
      '#FD79A8', '#0984E3', '#E17055', '#00CEC9', '#A29BFE',
    ];

    function colorFor(seed) {
      let hash = 0;
      for (let i = 0; i < seed.length; i++) hash = seed.charCodeAt(i) + ((hash << 5) - hash);
      return AVATAR_PALETTE[Math.abs(hash) % AVATAR_PALETTE.length];
    }

    function initials(name) {
      const words = String(name).trim().split(/\s+/);
      return ((words[0]?.[0] || '') + (words[1]?.[0] || '')).toUpperCase();
    }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
