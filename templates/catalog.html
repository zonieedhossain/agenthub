{% extends "base.html" %}
{% block title %}AgentHub — Catalog{% endblock %}
{% block content %}
<section class="hero">
    <h1>A catalog of professional AI agents.</h1>
    <p>Pick a profession, sign in for that agent only, and start chatting.</p>
</section>
<div id="catalog" class="catalog-list"></div>
<div id="pagination" class="pagination"></div>
{% endblock %}
{% block scripts %}
<script>
    let currentPage = 1;

    function loadPage(page) {
      currentPage = page;
      fetch(`/agents?page=${page}&limit=20`).then(r => r.json()).then(data => {
        document.getElementById('catalog').innerHTML = data.items.map(a => `
          <a class="row" href="/agents/${encodeURIComponent(a.slug)}">
            <span class="body">
              <span class="prof">${esc(a.profession)}</span><br>
              <span class="ind">${esc(a.industry)}</span>
            </span>
            <span class="arrow">→</span>
          </a>`).join('');

        document.getElementById('pagination').innerHTML = `
          <button ${data.page <= 1 ? 'disabled' : ''} onclick="loadPage(${data.page - 1})">← Prev</button>
          <span>Page ${data.page} of ${data.total_pages} (${data.total} agents)</span>
          <button ${data.page >= data.total_pages ? 'disabled' : ''} onclick="loadPage(${data.page + 1})">Next →</button>
        `;
      });
    }

    loadPage(1);
</script>
{% endblock %}
