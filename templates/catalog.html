{% extends "base.html" %}
{% block title %}AgentHub — Catalog{% endblock %}
{% block content %}
<section class="hero">
    <h1>A catalog of professional AI agents.</h1>
    <p>Pick a profession, sign in for that agent only, and start chatting.</p>
</section>
<div id="catalog" class="app-grid"></div>
<div id="pagination" class="pagination"></div>
{% endblock %}
{% block scripts %}
<script>
    let currentPage = 1;

    function loadPage(page) {
      currentPage = page;
      const grid = document.getElementById('catalog');
      grid.innerHTML = Array.from({length: 18}).map(() => `<div class="app-card skeleton"></div>`).join('');

      fetch(`/agents?page=${page}&limit=18`).then(r => r.json()).then(data => {
        grid.innerHTML = data.items.map(a => `
          <a class="app-card" href="/agents/${encodeURIComponent(a.slug)}" title="${esc(a.description)}">
            <div class="app-icon" style="background:${colorFor(a.profession)}">${esc(initials(a.profession))}</div>
            <div class="app-info">
              <div class="app-name">${esc(a.profession)}</div>
              <div class="app-industry">${esc(a.industry)}</div>
            </div>
          </a>`).join('');

        document.getElementById('pagination').innerHTML = `
          <button ${data.page <= 1 ? 'disabled' : ''} onclick="loadPage(${data.page - 1})">← Prev</button>
          <span>Page ${data.page} of ${data.total_pages} (${data.total} agents)</span>
          <button ${data.page >= data.total_pages ? 'disabled' : ''} onclick="loadPage(${data.page + 1})">Next →</button>
        `;
        window.scrollTo({top: 0, behavior: 'smooth'});
      });
    }

    loadPage(1);
</script>
{% endblock %}
